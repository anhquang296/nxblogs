<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f9fafb" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">RDS Proxy: Centralized Connection Pool</text>

  <!-- 7 Instances on left -->
  <!-- Row 1 -->
  <rect x="30" y="60" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="79" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 1</text>

  <rect x="30" y="100" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 2</text>

  <rect x="30" y="140" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="159" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 3</text>

  <rect x="30" y="180" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="199" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 4</text>

  <rect x="30" y="220" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 5</text>

  <rect x="30" y="260" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2" stroke-dasharray="3"/>
  <text x="87" y="279" text-anchor="middle" font-size="13" fill="#6b7280">. . .</text>

  <rect x="30" y="300" width="115" height="28" fill="#dbeafe" rx="4" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="87" y="319" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Instance 10</text>

  <!-- Diagonal lines from each instance to RDS Proxy box left edge midpoint (370, 195) -->
  <line x1="145" y1="74" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="145" y1="114" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="145" y1="154" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="145" y1="194" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="145" y1="234" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="145" y1="314" x2="370" y2="195" stroke="#374151" stroke-width="1" marker-end="url(#arr)"/>

  <!-- "Local Pool" inline label -->
  <rect x="180" y="170" width="130" height="22" fill="#fefce8" rx="3" stroke="#fde68a" stroke-width="1"/>
  <text x="245" y="185" text-anchor="middle" font-size="10" fill="#92400e">200 app connections</text>

  <!-- RDS Proxy box -->
  <rect x="380" y="100" width="200" height="200" fill="#fef3c7" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="135" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">RDS Proxy</text>
  <line x1="400" y1="148" x2="560" y2="148" stroke="#fbbf24"/>
  <text x="480" y="172" text-anchor="middle" font-size="12" fill="#92400e">Multiplex</text>
  <text x="480" y="195" text-anchor="middle" font-size="11" fill="#92400e">200 → ~50 connections</text>
  <text x="480" y="232" text-anchor="middle" font-size="11" fill="#78350f">Connection Draining</text>
  <text x="480" y="252" text-anchor="middle" font-size="11" fill="#78350f">IAM Authentication</text>
  <text x="480" y="272" text-anchor="middle" font-size="11" fill="#78350f">Failover -66% time</text>

  <!-- RDS Proxy -> PG (single diagonal/horizontal) -->
  <line x1="580" y1="200" x2="660" y2="200" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="585" y="178" width="80" height="20" fill="#dcfce7" rx="3"/>
  <text x="625" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">~50 conn</text>

  <!-- PostgreSQL -->
  <rect x="670" y="135" width="210" height="130" fill="#e0e7ff" rx="8" stroke="#818cf8" stroke-width="2"/>
  <text x="775" y="175" text-anchor="middle" font-size="15" font-weight="bold" fill="#3730a3">PostgreSQL</text>
  <text x="775" y="200" text-anchor="middle" font-size="12" fill="#4338ca">max_connections = 100</text>
  <text x="775" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">✓ ~50 connections</text>

  <!-- Comparison boxes -->
  <rect x="30" y="370" width="400" height="50" fill="#fee2e2" rx="6" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="390" text-anchor="middle" font-size="11" fill="#991b1b">Without RDS Proxy:</text>
  <text x="230" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">10 × 20 = 200 connections → Exceeds limit</text>

  <rect x="460" y="370" width="410" height="50" fill="#dcfce7" rx="6" stroke="#86efac" stroke-width="1"/>
  <text x="665" y="390" text-anchor="middle" font-size="11" fill="#166534">With RDS Proxy:</text>
  <text x="665" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">200 app conn → ~50 DB conn (multiplex)</text>

  <rect x="30" y="435" width="840" height="50" fill="white" rx="6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" font-size="12" fill="#374151">Bonus: 66% faster failover • IAM Auth (no hardcoded passwords) • Connection draining on scale down</text>
</svg>
