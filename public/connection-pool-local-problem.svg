<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#f9fafb" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Problem: N Instances × Local Pool</text>

  <!-- Instance + Local Pool badges (6 rows) -->
  <!-- Row 1 -->
  <rect x="40" y="65" width="110" height="32" fill="#dbeafe" rx="5" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Instance 1</text>
  <rect x="160" y="65" width="150" height="32" fill="white" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="86" text-anchor="middle" font-size="11" fill="#475569">Local Pool (max=20)</text>

  <!-- Row 2 -->
  <rect x="40" y="110" width="110" height="32" fill="#dbeafe" rx="5" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Instance 2</text>
  <rect x="160" y="110" width="150" height="32" fill="white" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="131" text-anchor="middle" font-size="11" fill="#475569">Local Pool (max=20)</text>

  <!-- Row 3 -->
  <rect x="40" y="155" width="110" height="32" fill="#dbeafe" rx="5" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Instance 3</text>
  <rect x="160" y="155" width="150" height="32" fill="white" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="176" text-anchor="middle" font-size="11" fill="#475569">Local Pool (max=20)</text>

  <!-- Row 4 -->
  <rect x="40" y="200" width="110" height="32" fill="#dbeafe" rx="5" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="221" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Instance 4</text>
  <rect x="160" y="200" width="150" height="32" fill="white" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="221" text-anchor="middle" font-size="11" fill="#475569">Local Pool (max=20)</text>

  <!-- Row 5 -->
  <rect x="40" y="245" width="110" height="32" fill="#dbeafe" rx="5" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Instance 5</text>
  <rect x="160" y="245" width="150" height="32" fill="white" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="266" text-anchor="middle" font-size="11" fill="#475569">Local Pool (max=20)</text>

  <!-- Row 6 (rejected) -->
  <rect x="40" y="290" width="110" height="32" fill="#fee2e2" rx="5" stroke="#dc2626" stroke-width="1.5"/>
  <text x="95" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Instance 6</text>
  <rect x="160" y="290" width="150" height="32" fill="#fef2f2" rx="5" stroke="#fca5a5" stroke-width="1"/>
  <text x="235" y="311" text-anchor="middle" font-size="11" fill="#991b1b">Local Pool (max=20)</text>

  <!-- Diagonal fan-in from each Local Pool to PG box left edge midpoint (570, 175) -->
  <line x1="310" y1="81" x2="570" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="126" x2="570" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="171" x2="570" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="216" x2="570" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="261" x2="570" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="310" y1="306" x2="570" y2="175" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrRed)"/>

  <!-- PostgreSQL box -->
  <rect x="570" y="100" width="290" height="160" fill="#e0e7ff" rx="8" stroke="#818cf8" stroke-width="2"/>
  <text x="715" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730a3">PostgreSQL</text>
  <text x="715" y="160" text-anchor="middle" font-size="13" fill="#4338ca">max_connections = 100</text>

  <rect x="600" y="180" width="230" height="28" fill="#fef3c7" rx="4" stroke="#fbbf24" stroke-width="1"/>
  <text x="715" y="199" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">5 × 20 = 100 → FULL</text>

  <rect x="600" y="216" width="230" height="28" fill="#fee2e2" rx="4" stroke="#dc2626" stroke-width="1"/>
  <text x="715" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">❌ Instance 6 → REJECTED</text>

  <!-- Bottom note -->
  <rect x="40" y="350" width="820" height="100" fill="white" rx="6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="450" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">The problem gets worse when:</text>
  <text x="80" y="404" font-size="12" fill="#374151">• Auto-scaling: 5 → 50 instances → connections grow from 100 to 1000</text>
  <text x="80" y="428" font-size="12" fill="#374151">• Lambda: 1000 concurrent invocations = 1000 connections</text>
</svg>
