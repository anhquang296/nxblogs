<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="800" height="360" fill="#f9fafb" rx="8"/>

  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Asynchronous Replication</text>

  <!-- Client -->
  <rect x="40" y="115" width="110" height="46" fill="#dbeafe" rx="6" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="95" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Client</text>

  <!-- WRITE arrow -->
  <line x1="150" y1="130" x2="240" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="123" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">WRITE</text>

  <!-- Primary box -->
  <rect x="250" y="70" width="220" height="240" fill="#e0e7ff" rx="8" stroke="#818cf8" stroke-width="2"/>
  <text x="360" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">Primary</text>
  <line x1="270" y1="106" x2="450" y2="106" stroke="#c7d2fe"/>

  <rect x="270" y="120" width="180" height="32" fill="white" rx="4" stroke="#e5e7eb" stroke-width="1"/>
  <text x="282" y="141" font-size="12" fill="#374151">1. Ghi vào local</text>

  <rect x="270" y="162" width="180" height="32" fill="#dcfce7" rx="4" stroke="#86efac" stroke-width="1"/>
  <text x="282" y="183" font-size="12" font-weight="600" fill="#166534">2. Trả "OK" NGAY</text>

  <rect x="270" y="240" width="180" height="32" fill="#fef3c7" rx="4" stroke="#fbbf24" stroke-width="1"/>
  <text x="282" y="261" font-size="11" fill="#92400e">3. Gửi log trong nền</text>

  <!-- Diagonal OK return arrow: from Primary left edge at step 2 (250, 178) to Client right edge top (150, 138) -->
  <line x1="250" y1="178" x2="155" y2="148" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="170" y="155" width="40" height="20" fill="#dcfce7" rx="3" stroke="#86efac" stroke-width="1"/>
  <text x="190" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">OK</text>

  <!-- Async dashed arrow -->
  <line x1="470" y1="256" x2="580" y2="256" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrAmber)"/>
  <text x="525" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">async</text>

  <!-- Replica box -->
  <rect x="590" y="180" width="180" height="140" fill="#e0e7ff" rx="8" stroke="#818cf8" stroke-width="1.5" opacity="0.85"/>
  <text x="680" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">Replica</text>
  <line x1="610" y1="220" x2="750" y2="220" stroke="#c7d2fe"/>
  <text x="680" y="247" text-anchor="middle" font-size="12" fill="#4338ca">Nhận và apply</text>
  <text x="680" y="285" text-anchor="middle" font-size="11" fill="#6b7280">(sau vài ms → vài giây)</text>

  <rect x="540" y="328" width="240" height="24" fill="#fef3c7" rx="4" stroke="#fbbf24" stroke-width="1"/>
  <text x="660" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">⚠ Có replication lag</text>
</svg>
