<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowHash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#f9fafb" rx="8"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Hash Table — O(1) Lookup for ZSCORE</text>

  <!-- Hash Table on left -->
  <text x="220" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Hash Table (dict)</text>

  <!-- Bucket header -->
  <rect x="80" y="90" width="80" height="28" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="120" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">bucket</text>
  <rect x="160" y="90" width="200" height="28" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="260" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">entry</text>

  <!-- Bucket 0 -->
  <rect x="80" y="118" width="80" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="120" y="139" text-anchor="middle" font-size="12" fill="#374151">0</text>
  <rect x="160" y="118" width="200" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="260" y="139" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">— empty —</text>

  <!-- Bucket 1: alice -->
  <rect x="80" y="150" width="80" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="120" y="171" text-anchor="middle" font-size="12" fill="#374151">1</text>
  <rect x="160" y="150" width="200" height="32" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="260" y="171" text-anchor="middle" font-size="13" fill="#166534" font-weight="500">"alice" → 1500</text>

  <!-- Bucket 2: bob -->
  <rect x="80" y="182" width="80" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="120" y="203" text-anchor="middle" font-size="12" fill="#374151">2</text>
  <rect x="160" y="182" width="200" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="260" y="203" text-anchor="middle" font-size="13" fill="#374151">"bob" → 2300</text>

  <!-- Bucket 3 -->
  <rect x="80" y="214" width="80" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="120" y="235" text-anchor="middle" font-size="12" fill="#374151">3</text>
  <rect x="160" y="214" width="200" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="260" y="235" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">— empty —</text>

  <!-- Bucket 4: carol -->
  <rect x="80" y="246" width="80" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="120" y="267" text-anchor="middle" font-size="12" fill="#374151">4</text>
  <rect x="160" y="246" width="200" height="32" fill="#ffffff" stroke="#d1d5db"/>
  <text x="260" y="267" text-anchor="middle" font-size="13" fill="#374151">"carol" → 1800</text>

  <!-- ... -->
  <rect x="80" y="278" width="280" height="32" fill="#f9fafb" stroke="#d1d5db" stroke-dasharray="3,3"/>
  <text x="220" y="299" text-anchor="middle" font-size="12" fill="#9ca3af" font-style="italic">...</text>

  <!-- Right side: ZSCORE flow -->
  <text x="600" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">ZSCORE "leaderboard" "alice"</text>

  <!-- Step 1 -->
  <rect x="440" y="100" width="320" height="50" fill="#fef3c7" rx="6" stroke="#fbbf24"/>
  <text x="600" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Step 1: hash("alice")</text>
  <text x="600" y="138" text-anchor="middle" font-size="11" fill="#78350f">Compute hash function on member name</text>

  <!-- Arrow -->
  <line x1="600" y1="155" x2="600" y2="180" stroke="#0891b2" stroke-width="2" marker-end="url(#arrowHash)"/>

  <!-- Step 2 -->
  <rect x="440" y="185" width="320" height="50" fill="#dbeafe" rx="6" stroke="#60a5fa"/>
  <text x="600" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Step 2: → bucket 1</text>
  <text x="600" y="223" text-anchor="middle" font-size="11" fill="#1e3a8a">Hash maps to bucket index</text>

  <!-- Arrow -->
  <line x1="600" y1="240" x2="600" y2="265" stroke="#0891b2" stroke-width="2" marker-end="url(#arrowHash)"/>

  <!-- Step 3 -->
  <rect x="440" y="270" width="320" height="50" fill="#dcfce7" rx="6" stroke="#86efac"/>
  <text x="600" y="291" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Step 3: return 1500 ✓</text>
  <text x="600" y="308" text-anchor="middle" font-size="11" fill="#14532d">Total: O(1) — no traversal, no sequential comparison</text>

  <!-- Connection from hash table to flow -->
  <line x1="365" y1="166" x2="438" y2="125" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="400" y="380" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">Hash table = "phone book" — know the name, get the result instantly.</text>
</svg>
