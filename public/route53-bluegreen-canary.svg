<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="320" fill="#f9fafb" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Blue/Green + Canary: Lộ Trình Chuyển Đổi</text>

  <rect x="55" y="48" width="20" height="14" fill="#1d4ed8" rx="3" stroke="#1e40af" stroke-width="1"/>
  <text x="80" y="59" font-size="11" fill="#374151">Blue (current)</text>
  <rect x="170" y="48" width="20" height="14" fill="#16a34a" rx="3" stroke="#15803d" stroke-width="1"/>
  <text x="195" y="59" font-size="11" fill="#374151">Green (new)</text>

  <line x1="130" y1="155" x2="700" y2="155" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6 3"/>

  <g transform="translate(90, 80)">
    <rect x="0" y="0" width="80" height="130" fill="#1d4ed8" rx="6" stroke="#1e40af" stroke-width="1.5"/>
    <text x="40" y="70" text-anchor="middle" font-size="14" fill="white" font-weight="bold">100%</text>
    <text x="40" y="155" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">Khởi đầu</text>
    <text x="40" y="175" text-anchor="middle" font-size="10" fill="#6b7280">Phase 1</text>
  </g>

  <line x1="185" y1="145" x2="245" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="80" height="123" fill="#1d4ed8" rx="6 6 0 0" stroke="#1e40af" stroke-width="1.5"/>
    <text x="40" y="65" text-anchor="middle" font-size="14" fill="white" font-weight="bold">95%</text>
    <rect x="0" y="123" width="80" height="7" fill="#16a34a" rx="0 0 6 6" stroke="#15803d" stroke-width="1.5"/>
    <text x="40" y="145" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="bold">5%</text>
    <text x="40" y="165" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">Canary</text>
    <text x="40" y="185" text-anchor="middle" font-size="10" fill="#6b7280">Phase 2</text>
  </g>

  <line x1="355" y1="145" x2="415" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="80" height="65" fill="#1d4ed8" rx="6 6 0 0" stroke="#1e40af" stroke-width="1.5"/>
    <text x="40" y="38" text-anchor="middle" font-size="14" fill="white" font-weight="bold">50%</text>
    <rect x="0" y="65" width="80" height="65" fill="#16a34a" rx="0 0 6 6" stroke="#15803d" stroke-width="1.5"/>
    <text x="40" y="105" text-anchor="middle" font-size="14" fill="white" font-weight="bold">50%</text>
    <text x="40" y="155" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">Kiểm tra</text>
    <text x="40" y="175" text-anchor="middle" font-size="10" fill="#6b7280">Phase 3</text>
  </g>

  <line x1="525" y1="145" x2="585" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(600, 80)">
    <rect x="0" y="0" width="80" height="130" fill="#16a34a" rx="6" stroke="#15803d" stroke-width="1.5"/>
    <text x="40" y="70" text-anchor="middle" font-size="14" fill="white" font-weight="bold">100%</text>
    <text x="40" y="155" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">Hoàn tất</text>
    <text x="40" y="175" text-anchor="middle" font-size="10" fill="#6b7280">Phase 4</text>
  </g>

  <rect x="140" y="285" width="520" height="25" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Weighted Routing Policy giúp kiểm soát tỷ lệ traffic giữa hai phiên bản</text>
</svg>