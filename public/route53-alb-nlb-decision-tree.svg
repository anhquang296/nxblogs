<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#f9fafb" rx="8"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e40af">Chọn Load Balancer Nào?</text>
  <rect x="300" y="55" width="200" height="50" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" rx="25"/>
  <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Bạn cần gì?</text>
  <line x1="400" y1="105" x2="400" y2="135" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="275" y="140" width="250" height="44" fill="white" stroke="#374151" stroke-width="1.5" rx="22" ry="22"/>
  <text x="400" y="167" text-anchor="middle" font-size="13" fill="#374151">Routing theo path/header?</text>
  <line x1="525" y1="162" x2="620" y2="162" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="155" font-size="11" fill="#16a34a" font-weight="bold">Yes</text>
  <rect x="635" y="142" width="120" height="40" fill="#e0e7ff" stroke="#818cf8" stroke-width="2" rx="8"/>
  <text x="695" y="167" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">ALB</text>
  <line x1="400" y1="184" x2="400" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="205" font-size="11" fill="#dc2626" font-weight="bold">No</text>
  <rect x="275" y="225" width="250" height="44" fill="white" stroke="#374151" stroke-width="1.5" rx="22" ry="22"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" fill="#374151">Failover &lt; 1 giây?</text>
  <line x1="525" y1="247" x2="620" y2="247" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="240" font-size="11" fill="#16a34a" font-weight="bold">Yes</text>
  <rect x="635" y="227" width="120" height="40" fill="#e0e7ff" stroke="#818cf8" stroke-width="2" rx="8"/>
  <text x="695" y="252" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">ALB / NLB</text>
  <line x1="400" y1="269" x2="400" y2="305" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="290" font-size="11" fill="#dc2626" font-weight="bold">No</text>
  <rect x="250" y="310" width="300" height="44" fill="white" stroke="#374151" stroke-width="1.5" rx="22" ry="22"/>
  <text x="400" y="337" text-anchor="middle" font-size="13" fill="#374151">Geo/Latency/Weighted routing?</text>
  <line x1="550" y1="332" x2="620" y2="332" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="325" font-size="11" fill="#16a34a" font-weight="bold">Yes</text>
  <rect x="635" y="312" width="120" height="40" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="8"/>
  <text x="695" y="337" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Route 53</text>
  <line x1="400" y1="354" x2="400" y2="400" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="380" font-size="11" fill="#dc2626" font-weight="bold">No</text>
  <rect x="300" y="405" width="200" height="50" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2" rx="8"/>
  <rect x="300" y="405" width="200" height="50" fill="url(#combo)" stroke="#1d4ed8" stroke-width="2" rx="8"/>
  <defs>
    <linearGradient id="combo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <text x="400" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Route 53 + ALB</text>
  <text x="400" y="443" text-anchor="middle" font-size="11" fill="#3730a3">Kết hợp cả hai</text>
  <text x="400" y="485" text-anchor="middle" font-size="11" fill="#6b7280">Lựa chọn phụ thuộc vào yêu cầu cụ thể của hệ thống</text>
</svg>