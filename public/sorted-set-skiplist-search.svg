<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d1d5db"/>
    </marker>
    <marker id="arrPath" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="470" fill="#f9fafb" rx="8"/>

  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">Find score = 2100 — red search path through forward pointers</text>

  <!-- Level labels -->
  <text x="50" y="101" font-size="11" fill="#6b7280" font-weight="600">L3</text>
  <text x="50" y="125" font-size="11" fill="#6b7280" font-weight="600">L2</text>
  <text x="50" y="149" font-size="11" fill="#6b7280" font-weight="600">L1</text>
  <text x="50" y="173" font-size="11" fill="#6b7280" font-weight="600">L0</text>

  <!-- Faint level guides -->
  <line x1="80" y1="97" x2="840" y2="97" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="121" x2="840" y2="121" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="145" x2="840" y2="145" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="169" x2="840" y2="169" stroke="#f3f4f6" stroke-width="1"/>

  <!-- HEAD -->
  <rect x="85" y="85" width="45" height="96" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" rx="4"/>
  <line x1="85" y1="109" x2="130" y2="109" stroke="#a5b4fc" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="85" y1="133" x2="130" y2="133" stroke="#a5b4fc" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="85" y1="157" x2="130" y2="157" stroke="#a5b4fc" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="118" cy="97" r="3.5" fill="#1e3a8a"/>
  <circle cx="118" cy="121" r="3.5" fill="#1e3a8a"/>
  <circle cx="118" cy="145" r="3.5" fill="#1e3a8a"/>
  <circle cx="118" cy="169" r="3.5" fill="#1e3a8a"/>
  <text x="107" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">HEAD</text>

  <!-- alice (h=2) -->
  <rect x="215" y="133" width="60" height="82" fill="#ffffff" stroke="#374151" stroke-width="2" rx="4"/>
  <line x1="215" y1="157" x2="275" y2="157" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="215" y1="181" x2="275" y2="181" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="263" cy="145" r="3.5" fill="#1f2937"/>
  <circle cx="263" cy="169" r="3.5" fill="#1f2937"/>
  <text x="245" y="199" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">alice</text>
  <text x="245" y="212" text-anchor="middle" font-size="11" fill="#6b7280">1500</text>

  <!-- carol (h=3) — visited (yellow) -->
  <rect x="365" y="109" width="60" height="106" fill="#fef3c7" stroke="#b45309" stroke-width="2.5" rx="4"/>
  <line x1="365" y1="133" x2="425" y2="133" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="365" y1="157" x2="425" y2="157" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="365" y1="181" x2="425" y2="181" stroke="#b45309" stroke-width="1"/>
  <circle cx="413" cy="121" r="3.5" fill="#92400e"/>
  <circle cx="413" cy="145" r="3.5" fill="#92400e"/>
  <circle cx="413" cy="169" r="3.5" fill="#92400e"/>
  <text x="395" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">carol</text>
  <text x="395" y="212" text-anchor="middle" font-size="11" fill="#78350f">1800</text>

  <!-- dave (h=1) — TARGET -->
  <rect x="515" y="157" width="60" height="58" fill="#dcfce7" stroke="#15803d" stroke-width="2.5" rx="4"/>
  <line x1="515" y1="181" x2="575" y2="181" stroke="#15803d" stroke-width="1"/>
  <circle cx="563" cy="169" r="3.5" fill="#166534"/>
  <text x="545" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">dave ✓</text>
  <text x="545" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">2100</text>

  <!-- bob (h=2) -->
  <rect x="665" y="133" width="60" height="82" fill="#ffffff" stroke="#374151" stroke-width="2" rx="4"/>
  <line x1="665" y1="157" x2="725" y2="157" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="665" y1="181" x2="725" y2="181" stroke="#9ca3af" stroke-width="1"/>
  <circle cx="713" cy="145" r="3.5" fill="#1f2937"/>
  <circle cx="713" cy="169" r="3.5" fill="#1f2937"/>
  <text x="695" y="199" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2937">bob</text>
  <text x="695" y="212" text-anchor="middle" font-size="11" fill="#6b7280">2300</text>

  <!-- NIL -->
  <rect x="800" y="85" width="40" height="96" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,2" rx="4"/>
  <text x="820" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#6b7280">NIL</text>

  <!-- =========== Background grey forward pointers =========== -->
  <line x1="121" y1="97" x2="800" y2="97" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="121" y1="121" x2="365" y2="121" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="416" y1="121" x2="800" y2="121" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="121" y1="145" x2="215" y2="145" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="266" y1="145" x2="365" y2="145" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="416" y1="145" x2="665" y2="145" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="716" y1="145" x2="800" y2="145" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="121" y1="169" x2="215" y2="169" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="266" y1="169" x2="365" y2="169" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="416" y1="169" x2="515" y2="169" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="566" y1="169" x2="665" y2="169" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>
  <line x1="716" y1="169" x2="800" y2="169" stroke="#e5e7eb" stroke-width="1.2" marker-end="url(#arrGray)"/>

  <!-- =========== Search path RED =========== -->
  <!-- ① drop L3→L2 inside HEAD (vertical) -->
  <line x1="118" y1="100" x2="118" y2="116" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrPath)"/>
  <text x="100" y="113" font-size="12" font-weight="700" fill="#dc2626">①</text>

  <!-- ② HEAD L2 → carol L2 -->
  <line x1="121" y1="121" x2="365" y2="121" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrPath)"/>
  <text x="240" y="115" font-size="12" font-weight="700" fill="#dc2626">②</text>

  <!-- ③ drop L2→L1 inside carol -->
  <line x1="413" y1="124" x2="413" y2="140" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrPath)"/>
  <text x="430" y="135" font-size="12" font-weight="700" fill="#dc2626">③</text>

  <!-- ④ drop L1→L0 inside carol -->
  <line x1="413" y1="148" x2="413" y2="164" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrPath)"/>
  <text x="430" y="159" font-size="12" font-weight="700" fill="#dc2626">④</text>

  <!-- ⑤ carol L0 → dave L0 -->
  <line x1="416" y1="169" x2="515" y2="169" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrPath)"/>
  <text x="455" y="163" font-size="12" font-weight="700" fill="#dc2626">⑤</text>

  <!-- Step legend -->
  <rect x="60" y="270" width="780" height="180" fill="#ffffff" rx="6" stroke="#e5e7eb"/>
  <text x="80" y="295" font-size="13" font-weight="600" fill="#111827">Search path for score = 2100:</text>

  <text x="80" y="320" font-size="12" fill="#374151"><tspan font-weight="700" fill="#dc2626">①</tspan> At HEAD: <tspan font-family="ui-monospace, monospace">forward[3] = NIL</tspan> → drop to L2 (stay at HEAD, read <tspan font-family="ui-monospace, monospace">forward[2]</tspan>)</text>
  <text x="80" y="342" font-size="12" fill="#374151"><tspan font-weight="700" fill="#dc2626">②</tspan> At HEAD L2: <tspan font-family="ui-monospace, monospace">forward[2] = carol(1800)</tspan>, 1800 &lt; 2100 → move to carol</text>
  <text x="80" y="364" font-size="12" fill="#374151"><tspan font-weight="700" fill="#dc2626">③</tspan> At carol L2: <tspan font-family="ui-monospace, monospace">forward[2] = NIL</tspan> → drop to L1 (read <tspan font-family="ui-monospace, monospace">forward[1]</tspan>)</text>
  <text x="80" y="386" font-size="12" fill="#374151"><tspan font-weight="700" fill="#dc2626">④</tspan> At carol L1: <tspan font-family="ui-monospace, monospace">forward[1] = bob(2300)</tspan>, 2300 ≥ 2100 → drop to L0</text>
  <text x="80" y="408" font-size="12" fill="#374151"><tspan font-weight="700" fill="#dc2626">⑤</tspan> At carol L0: <tspan font-family="ui-monospace, monospace">forward[0] = dave(2100)</tspan> → found ✓</text>
  <text x="80" y="436" font-size="11" fill="#6b7280" font-style="italic">Vertical arrow within same node = switch to reading <tspan font-family="ui-monospace, monospace">forward[level-1]</tspan> (no physical "down" pointer).</text>
</svg>
